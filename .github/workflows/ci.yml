name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Build & test (ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal --component rustfmt,clippy && rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Build
        run: cargo build --all-targets

      # Integration tests run tapes against a real PTY; ubuntu-latest ships
      # the pinned shell (bash) out of the box.
      - name: Test
        run: cargo test

      - name: Format
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Check examples parse
        run: |
          cargo build --release
          for tape in examples/*.tape; do
            echo "== $tape"
            ./target/release/vhs-rs check "$tape"
          done

  # The PTY layer (forkpty, EIO-vs-EOF on the master, waitpid) is the
  # platform-sensitive core, and releases ship aarch64-apple-darwin — so the
  # full suite must actually run on macOS, not just build there.
  test-macos:
    name: Build & test (macos)
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal && rustup default stable

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry/index
            ~/.cargo/registry/cache
            ~/.cargo/git/db
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - name: Test
        run: cargo test
