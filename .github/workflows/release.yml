name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-14
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Add target
        run: rustup target add ${{ matrix.target }}

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Smoke test
        run: |
          ./target/${{ matrix.target }}/release/vhs-rs --version
          ./target/${{ matrix.target }}/release/vhs-rs check examples/demo.tape

      - name: Package
        run: |
          staging=vhs-rs-${{ matrix.target }}
          mkdir "$staging"
          cp target/${{ matrix.target }}/release/vhs-rs LICENSE README.md "$staging/"
          tar -czf "$staging.tar.gz" "$staging"
          shasum -a 256 "$staging.tar.gz" > "$staging.tar.gz.sha256"

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${GITHUB_REF#refs/tags/}"
          gh release create "$tag" --generate-notes --title "$tag" 2>/dev/null || true
          gh release upload "$tag" vhs-rs-${{ matrix.target }}.tar.gz vhs-rs-${{ matrix.target }}.tar.gz.sha256 --clobber
